name: CI — Quality Gate

on:
  pull_request:
    branches:
      - main

env:
  IMAGE_BACKEND: ghcr.io/luisrodvilladaorg/wellness-ops-backend

jobs:

  lint-and-test:
    name: Lint & Tests (backend)
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test


  build-and-scan:
    name: Build & Trivy Scan
    runs-on: self-hosted
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build backend image (no push)
        run: |
          docker buildx build \
            -f backend/Dockerfile.prod \
            -t ${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }} \
            --load \
            backend

      - name: Trivy scan — CRITICAL blocker
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Cleanup local image
        if: always()
        run: docker rmi ${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }} || true
