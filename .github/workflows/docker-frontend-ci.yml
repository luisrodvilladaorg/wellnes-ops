name: Frontend CI

on:
  push:
    branches:
      - main
      
  pull_request:

jobs:
  frontend-ci:
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Validate frontend structure
      - name: Validate frontend structure
        run: |
          test -f frontend/Dockerfile.prod
          test -d frontend/mi-web
          test -f frontend/mi-web/index.html
          test -d frontend/mi-web/css
          test -d frontend/mi-web/js

      # 3️⃣ Build frontend Docker image (build only)
      - name: Build frontend Docker image
        run: |
          docker build \
            -f frontend/Dockerfile.prod \
            -t frontend-ci:test \
            frontend
