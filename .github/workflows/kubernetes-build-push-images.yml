name: CI/CD (GitOps PRO)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/luisrodvilladaorg/wellness-ops-frontend
  IMAGE_BACKEND: ghcr.io/luisrodvilladaorg/wellness-ops-backend

jobs:

# =========================
# 🟢 DEV (main branch)
# =========================
  build-dev:
    if: github.ref_type == 'branch'
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      # =========================
      # BUILD LOCAL (sin push)
      # =========================
      - name: Build frontend DEV (local)
        run: |
          docker buildx build \
          -f frontend/Dockerfile.prod \
          -t ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }} \
          --load \
          frontend

      - name: Build backend DEV (local)
        run: |
          docker buildx build \
          -f backend/Dockerfile.prod \
          -t ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }} \
          --load \
          backend

      # =========================
      # TRIVY SCAN
      # =========================
      - name: Trivy scan frontend DEV
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan backend DEV
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # =========================
      # PUSH
      # =========================
      - name: Push frontend DEV
        run: docker push ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Push backend DEV
        run: docker push ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: luisrodvilladaorg/wellness-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: wellness-gitops

      - name: Update DEV frontend
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}|" \
          wellness-gitops/k8s/overlays/dev/frontend/patch-image.yml

      - name: Update DEV backend
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}|" \
          wellness-gitops/k8s/overlays/dev/backend/patch-image.yml

      - name: Commit & push (DEV)
        run: |
          cd wellness-gitops
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add .
          git commit -m "dev: update images to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push

# =========================
# 🔴 PROD (tags)
# =========================
  build-prod:
    if: github.ref_type == 'tag'
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      # =========================
      # BUILD LOCAL (sin push)
      # =========================
      - name: Build frontend PROD (local)
        run: |
          docker buildx build \
          -f frontend/Dockerfile.prod \
          -t ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }} \
          --load \
          frontend

      - name: Build backend PROD (local)
        run: |
          docker buildx build \
          -f backend/Dockerfile.prod \
          -t ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }} \
          --load \
          backend

      # =========================
      # TRIVY SCAN
      # =========================
      - name: Trivy scan frontend PROD
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan backend PROD
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # =========================
      # PUSH
      # =========================
      - name: Push frontend PROD
        run: docker push ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Push backend PROD
        run: docker push ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: luisrodvilladaorg/wellness-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: wellness-gitops

      - name: Update PROD frontend
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}|" \
          wellness-gitops/k8s/overlays/prod/frontend/patch-image.yml

      - name: Update PROD backend
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}|" \
          wellness-gitops/k8s/overlays/prod/backend/patch-image.yml

      - name: Commit & push (PROD)
        run: |
          cd wellness-gitops
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add .
          git commit -m "prod: release ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push